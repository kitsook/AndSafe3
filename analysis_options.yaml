# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# The issues identified by the analyzer are surfaced in the UI of Dart-enabled
# IDEs (VS Code, Android Studio, IntelliJ). They can also be investigated from
# the command line by running `flutter analyze`.

# The following line activates a set of recommended lints for Flutter apps,
# packages, and plugins designed to encourage good coding practices.
include: package:flutter_lints/flutter.yaml

linter:
  # The project-specific rules can be customized here.
  # For a list of all available lints, see https://dart.dev/guides/language/analysis-options#enabling-additional-rules
  rules:
    # Temporarily disabled rules to establish a clean baseline for the existing codebase.
    # These can be incrementally re-enabled as the code is refactored.
    use_build_context_synchronously: false
    unnecessary_this: false
    constant_identifier_names: false
    unnecessary_new: false
    sort_child_properties_last: false
    avoid_unnecessary_containers: false
    use_key_in_widget_constructors: false
    prefer_interpolation_to_compose_strings: false
    prefer_final_fields: false
    prefer_collection_literals: false
    prefer_is_empty: false
    prefer_const_constructors_in_immutables: false
    prefer_adjacent_string_concatenation: false
    use_super_parameters: false
    unnecessary_underscores: false
    unintended_html_in_doc_comment: false
    strict_top_level_inference: false
    sized_box_for_whitespace: false
    no_logic_in_create_state: false
    no_leading_underscores_for_local_identifiers: false
    library_private_types_in_public_api: false
    camel_case_types: false
